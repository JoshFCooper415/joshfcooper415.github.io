<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Background</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
        :root{--gold:#C9A84C;--gold-l:#E8C96D;--bg:#050508;--text:#E0D4B8;}
        *{box-sizing:border-box;margin:0;padding:0;}
        html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);}

        #stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
        #particles{position:fixed;inset:0;pointer-events:none;z-index:3;overflow:hidden;}
        .particle{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--gold);opacity:0;animation:float-up linear forwards;}
        @keyframes float-up{0%{opacity:0;transform:translateY(0)scale(1)}15%{opacity:.9}100%{opacity:0;transform:translateY(-90px)scale(0)}}

        .page{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;align-items:center;padding:12px 16px 10px;gap:6px;}

        /* ── Top ── */
        .top{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;width:100%;}
        .back-link{align-self:flex-start;color:var(--gold);text-decoration:none;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:2px;opacity:.5;transition:opacity .3s;}
        .back-link:hover{opacity:1;}
        h1{font-family:'Cinzel Decorative',serif;font-size:clamp(.95rem,3vw,1.9rem);color:var(--gold);letter-spacing:4px;text-shadow:0 0 22px rgba(201,168,76,.38);}
        .divider{width:160px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:.28;}

        /* ── Content area (cards + side story) ── */
        .content-area{flex:1;min-height:0;display:flex;gap:16px;width:100%;align-items:stretch;}
        .card-row{flex:1;min-height:0;display:flex;gap:16px;align-items:flex-start;justify-content:center;}

        .card-col{display:flex;flex-direction:column;align-items:center;gap:7px;width:var(--card-w,160px);}

        /* label above card */
        .col-label{height:22px;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;opacity:0;transform:translateY(-4px);transition:opacity .5s,transform .5s;text-align:center;line-height:22px;}
        .col-label.show{opacity:.75;transform:translateY(0);}

        /* card flip */
        .card-scene{width:var(--card-w,160px);height:var(--card-h,270px);cursor:pointer;perspective:900px;flex-shrink:0;}
        .card-scene.picked{cursor:default;}
        .card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .85s cubic-bezier(.4,0,.2,1);}
        .card.flipped{transform:rotateY(180deg);}
        .card-scene:not(.picked):hover .card:not(.flipped){transform:translateY(-8px);}
        .card-face{position:absolute;inset:0;border-radius:10px;backface-visibility:hidden;overflow:hidden;border:1.5px solid rgba(201,168,76,.25);box-shadow:0 6px 24px rgba(0,0,0,.8);}
        .card-back{background:linear-gradient(148deg,#0e0b1e,#1c0f30 55%,#0e0b1e);display:flex;align-items:center;justify-content:center;}
        .card-back-inner{width:87%;height:87%;border:1px solid rgba(201,168,76,.2);border-radius:7px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
        .card-back-inner::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 7px,rgba(201,168,76,.032) 7px,rgba(201,168,76,.032) 8px),repeating-linear-gradient(-45deg,transparent,transparent 7px,rgba(138,43,226,.032) 7px,rgba(138,43,226,.032) 8px);}
        .back-sym{font-size:2rem;opacity:.4;position:relative;z-index:1;color:var(--gold);filter:drop-shadow(0 0 5px var(--gold));}
        .card-front{transform:rotateY(180deg);background:#08061a;}
        .card-front img{width:100%;height:100%;object-fit:cover;display:block;}

        /* aspect text below card */
        .aspect-text{width:100%;opacity:0;transform:translateY(6px);transition:opacity .55s ease .2s,transform .55s ease .2s;text-align:center;}
        .aspect-text.show{opacity:1;transform:translateY(0);}
        .aspect-card-name{font-family:'Cinzel',serif;font-size:clamp(.62rem,1.4vw,.78rem);color:var(--gold);letter-spacing:1px;margin-bottom:3px;}
        .aspect-label{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:3px;color:var(--gold);opacity:.45;text-transform:uppercase;margin-bottom:2px;}
        .aspect-val{font-family:'Crimson Text',serif;font-size:clamp(.75rem,1.6vw,.9rem);color:var(--text);opacity:.88;line-height:1.4;}

        /* ── Side story panel ── */
        .story-panel{width:220px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:0 10px 0 20px;border-left:1px solid rgba(201,168,76,.12);overflow-y:auto;opacity:0;pointer-events:none;transform:translateX(14px);transition:opacity .7s ease,transform .7s ease;}
        .story-panel.show{opacity:1;pointer-events:auto;transform:translateX(0);}
        .story-panel.all-major{border-left-color:rgba(201,168,76,.45);box-shadow:-4px 0 24px rgba(201,168,76,.07);}
        .arcana-eyebrow{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:4px;color:var(--gold);opacity:.6;text-transform:uppercase;text-align:center;}
        .bg-name{font-family:'Cinzel Decorative',serif;font-size:clamp(.8rem,1.8vw,1.1rem);color:var(--gold);letter-spacing:3px;text-shadow:0 0 18px rgba(201,168,76,.35);text-align:center;}
        .story-panel.all-major .bg-name{font-size:clamp(.65rem,1.3vw,.85rem);letter-spacing:1.5px;text-shadow:0 0 28px rgba(201,168,76,.55);}
        .bg-story{font-family:'Crimson Text',serif;font-style:italic;font-size:clamp(.75rem,1.4vw,.88rem);color:var(--text);opacity:.82;line-height:1.6;text-align:center;}
        .bonus-line{display:none;font-family:'Crimson Text',serif;font-style:italic;font-size:clamp(.68rem,1.2vw,.78rem);color:var(--gold-l);opacity:.68;text-align:center;line-height:1.55;border-top:1px solid rgba(201,168,76,.18);padding-top:10px;}
        .bonus-line.show{display:block;}

        /* ── Footer ── */
        .footer{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:2px;}
        .draw-btn{font-family:'Cinzel Decorative',serif;font-size:.75rem;letter-spacing:2px;color:var(--bg);background:linear-gradient(135deg,var(--gold-l),var(--gold));border:none;padding:9px 30px;border-radius:40px;cursor:pointer;transition:all .3s;box-shadow:0 0 12px rgba(201,168,76,.22),0 3px 8px rgba(0,0,0,.5);opacity:0;transform:translateX(6px);pointer-events:none;}
        .draw-btn.show{opacity:1;transform:translateX(0);pointer-events:auto;}
        .draw-btn:hover{box-shadow:0 0 26px rgba(201,168,76,.42),0 5px 14px rgba(0,0,0,.5);}
        .ornament{font-size:.85rem;opacity:.16;color:var(--gold);}
    </style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="particles"></div>

<div class="page">
    <div class="top">
        <a href="selectGame.html" class="back-link">← Return</a>
        <h1>Draw Your Fate</h1>
        <div class="divider"></div>
    </div>

    <div class="content-area">
        <div class="card-row" id="card-row">
            <!-- built by JS -->
        </div>
        <div class="story-panel" id="story-panel">
            <div class="bg-name" id="bg-name"></div>
            <div class="bg-story" id="bg-story"></div>
            <div class="bonus-line" id="bonus-line"></div>
            <button class="draw-btn" id="draw-btn" onclick="deal()">Draw Again</button>
        </div>
    </div>

    <div class="footer">
        <div class="ornament">✦ ✧ ✦</div>
    </div>
</div>

<script>
// ── Starfield ──────────────────────────────────────────────────────────
const sc=document.getElementById('stars'),sCtx=sc.getContext('2d');let stars=[];
function rsz(){sc.width=innerWidth;sc.height=innerHeight;stars=[];const n=Math.floor(sc.width*sc.height/4500);for(let i=0;i<n;i++)stars.push({x:Math.random()*sc.width,y:Math.random()*sc.height,r:Math.random()*1.1+.3,a:Math.random()*.7+.1,sp:Math.random()*.007+.002,ph:Math.random()*Math.PI*2});}
function anim(t){sCtx.clearRect(0,0,sc.width,sc.height);for(const s of stars){const a=s.a*(.55+.45*Math.sin(t*s.sp+s.ph));sCtx.beginPath();sCtx.arc(s.x,s.y,s.r,0,Math.PI*2);sCtx.fillStyle=`rgba(232,201,109,${a})`;sCtx.fill();}requestAnimationFrame(anim);}
window.addEventListener('resize',()=>{rsz();deal();});rsz();requestAnimationFrame(anim);

function spawnP(x,y){const c=document.getElementById('particles');for(let i=0;i<12;i++){const p=document.createElement('div');p.className='particle';p.style.left=(x+(Math.random()-.5)*55)+'px';p.style.top=(y+(Math.random()-.5)*32)+'px';p.style.animationDuration=(Math.random()*1.2+.8)+'s';p.style.animationDelay=(Math.random()*.2)+'s';c.appendChild(p);p.addEventListener('animationend',()=>p.remove());}}

// ── Features ───────────────────────────────────────────────────────────
const FEATURES={
    wanderer:{name:"The Long Road",lang:"any one language",desc:"You can always find food and shelter for yourself and your party in any settlement. Locals recognize the look of someone who has walked far and tends to share what little they have."},
    scholar:{name:"Keeper of Lore",lang:"one ancient language (Elvish, Dwarvish, or Draconic)",desc:"Given a day in any city, you can find research materials, translate unusual scripts, or locate a subject expert through your network of scholars and scribes."},
    healer:{name:"Healer's Touch",lang:"Celestial",desc:"When you spend 10 minutes tending to a creature it regains 1 extra hit point from any healing until your next long rest. You never need healer's tools to stabilize the dying."},
    shadow:{name:"Shadow Network",lang:"Thieves' Cant",desc:"You know how to find the criminal underworld of any city within hours — safe houses, black-market contacts, and information all available if you know the right signs."},
    performer:{name:"By Popular Demand",lang:"any one language",desc:"Whenever you perform publicly you can always find a venue in exchange for entertainment. People remember your face fondly and crowds are more willing to share information and favors."},
    soldier:{name:"Iron Name",lang:"any one language",desc:"Your background earns deference from soldiers and guards. You can requisition basic supplies from military organizations, and rank-and-file fighters are inclined to follow your lead."},
    devout:{name:"Eyes of the Divine",lang:"Celestial",desc:"Religious institutions provide you shelter, food, and counsel. Your prayers are noticed by higher powers — though not always answered in the way you expect."},
    merchant:{name:"Market Sense",lang:"any one language",desc:"You always know the going rate for goods and can smell a fleecing at distance. Traders treat you as a peer, offering honest prices, and rare items find their way to you through trade networks."},
    survivor:{name:"Born from Ruin",lang:"any one language",desc:"You recognize desperation in others before they speak it, and always know when someone is hiding genuine danger behind a calm face. Harsh environments feel familiar rather than threatening."},
    fortune:{name:"Fortune's Fool",lang:"any one language",desc:"Once per long rest, declare a moment of blind luck and reroll any one d20 before the result is known. You also always know where the nearest game of chance is — and the house always seems uneasy to see you."},
    exile:{name:"Second Life",lang:"any one language",desc:"You maintain a convincing false identity and can slip into it at need. Someone from your true past knows you are alive — whether ally or threat is something you manage carefully."},
    lover:{name:"Heartstring",lang:"Elvish",desc:"People who spend meaningful time with you form genuine attachments with unusual speed. NPCs who consider you a friend will take risks they would not otherwise. This has cost you as much as it has given you."},
};

// ── Card data ─────────────────────────────────────────────────────────
const CARDS=[
// MAJOR ARCANA
{name:"The Fool",file:"tarot/cards/major/fool.png",skills:["Acrobatics","Survival"],tool:"Dice Set",equip:["worn traveler's pack","bedroll","10 torches"],feat:"wanderer",adj:"Wandering",noun:"Fool",origin:"You left everything behind on a whim, stepping off the edge of your old life into glorious uncertainty",event:"blind chance brought you face to face with something you were never supposed to see",calling:"the road still calls you forward with promises it may never keep"},
{name:"The Magician",file:"tarot/cards/major/magician.png",skills:["Arcana","Sleight of Hand"],tool:"Forgery Kit",equip:["arcane focus","forged papers","5 candles"],feat:"scholar",adj:"Cunning",noun:"Conjurer",origin:"You taught yourself what no tutor would willingly share, bending rules until they bent back",event:"you performed a feat of impossible skill that made believers of skeptics and enemies of rivals",calling:"mastery over the unseen forces of the world is the only ambition that still keeps you awake"},
{name:"The High Priestess",file:"tarot/cards/major/high priestess.png",skills:["Religion","Insight"],tool:"Calligrapher's Supplies",equip:["prayer beads","holy symbol","2 sticks of incense"],feat:"devout",adj:"Veiled",noun:"Seer",origin:"You were raised at the threshold of sacred things, learning to listen to what others could not hear",event:"a divine silence fell over you, and in that silence something vast whispered its secrets",calling:"you carry a truth you cannot yet speak, waiting for the moment it is ready to be known"},
{name:"The Empress",file:"tarot/cards/major/empress.png",skills:["Nature","Persuasion"],tool:"Herbalism Kit",equip:["herbalism kit","healing potion","fine clothes"],feat:"healer",adj:"Abundant",noun:"Caretaker",origin:"You were born into comfort, or perhaps earned it, learning that the world grows best when tended with open hands",event:"someone placed their life in your care and you discovered what it means to truly matter to another",calling:"you seek to make every place you touch a little more whole than you found it"},
{name:"The Emperor",file:"tarot/cards/major/emperor.png",skills:["Athletics","Intimidation"],tool:"Smith's Tools",equip:["battle trophy","officer's seal","5 gp"],feat:"soldier",adj:"Iron",noun:"Commander",origin:"You built your reputation on discipline and consequence, commanding respect from necessity or fear",event:"your authority was tested in fire and you either held the line or learned what it costs to break",calling:"order must be preserved at any price and you are the one willing to pay it"},
{name:"The Hierophant",file:"tarot/cards/major/hierophant.png",skills:["Religion","History"],tool:"Calligrapher's Supplies",equip:["holy text","prayer beads","ceremonial robes"],feat:"devout",adj:"Sacred",noun:"Keeper",origin:"You were a keeper of tradition, trained in rites and duties older than any living memory",event:"your faith was tested by a heresy you could not ignore or condemn without first understanding",calling:"you seek to bridge the ancient ways with the living world, one soul at a time"},
{name:"The Lovers",file:"tarot/cards/major/lovers.png",skills:["Persuasion","Insight"],tool:"Disguise Kit",equip:["sealed love letter","fine clothes","perfume vial"],feat:"lover",adj:"Devoted",noun:"Wanderer",origin:"You have always moved through the world with your heart before your head and paid the price",event:"a single impossible choice between two paths left you forever changed and perhaps forever grateful",calling:"you still believe in the power of one true thing, whatever form it takes"},
{name:"The Chariot",file:"tarot/cards/major/chariot.png",skills:["Athletics","Animal Handling"],tool:"Vehicles (Land)",equip:["riding boots","military saddle","50 ft of rope"],feat:"soldier",adj:"Relentless",noun:"Rider",origin:"You were always moving, always pressing forward, taking orders or giving them on the long road of conflict",event:"you won something through sheer will when all odds said stop",calling:"victory is not a destination but a discipline and you will not be the one to stop first"},
{name:"Strength",file:"tarot/cards/major/strength.png",skills:["Athletics","Animal Handling"],tool:"Smith's Tools",equip:["manacles","hunting trap","beast trophy"],feat:"survivor",adj:"Unyielding",noun:"Tamer",origin:"You learned early that strength without patience breaks everything it touches and gentleness can move mountains",event:"something wild and dangerous was placed in your hands and you chose compassion over force",calling:"you carry the weight of your choices with quiet pride knowing you did not have to be kind"},
{name:"The Hermit",file:"tarot/cards/major/hermit.png",skills:["Medicine","Religion"],tool:"Herbalism Kit",equip:["herbalism kit","hand-drawn map","winter blanket"],feat:"scholar",adj:"Quiet",noun:"Seeker",origin:"You withdrew from the noise of the world and found in its absence something worth returning for",event:"a revelation came to you in the silence — an answer you had been asking the wrong questions to reach",calling:"wisdom is not something to hoard but to carry carefully back into the light for others"},
{name:"Wheel of Fortune",file:"tarot/cards/major/wheel of fortune.png",skills:["Insight","Persuasion"],tool:"Playing Card Set",equip:["lucky charm","playing cards","15 gp"],feat:"fortune",adj:"Lucky",noun:"Gambler",origin:"The wheel of fortune spun you high before it spun you low and you learned to love the spinning",event:"everything changed in an instant — one roll of the dice — and you adapted",calling:"fate is not fixed and you intend to prove it with every improbable decision you survive"},
{name:"Justice",file:"tarot/cards/major/justice.png",skills:["Investigation","Insight"],tool:"Navigator's Tools",equip:["writ of authority","manacles","10 gp"],feat:"soldier",adj:"Measured",noun:"Arbiter",origin:"You served a system of law, or challenged one, and either way learned that justice demands sacrifice",event:"a case was brought before you that had no clean answer, only a choice between two forms of wrong",calling:"the scales must balance and you are willing to be the weight that tips them toward what is right"},
{name:"The Hanged Man",file:"tarot/cards/major/hanged man.png",skills:["Insight","Persuasion"],tool:"Forgery Kit",equip:["broken shackle","forged identity papers","dark traveling cloak"],feat:"exile",adj:"Suspended",noun:"Exile",origin:"You hung between two worlds — neither free nor fully bound — and saw everything differently from that angle",event:"you were made to wait, to sacrifice, to pause everything when you most wanted to act",calling:"the delay was the lesson and you carry its strange wisdom wherever the road takes you"},
{name:"Death",file:"tarot/cards/major/death.png",skills:["Medicine","Survival"],tool:"Poisoner's Kit",equip:["bone token (memento)","burial shroud","5 cp"],feat:"survivor",adj:"Transformed",noun:"Survivor",origin:"Something that was you ended completely and without ceremony, leaving a new thing standing in its place",event:"you watched an ending, or lived through one, and understood that endings are the only true beginnings",calling:"you release what is finished without grief, moving always toward what is still alive and possible"},
{name:"Temperance",file:"tarot/cards/major/temperance.png",skills:["Medicine","Persuasion"],tool:"Alchemist's Supplies",equip:["2 healing potions","measuring scales","common clothes"],feat:"healer",adj:"Patient",noun:"Healer",origin:"You learned the art of balance, mixing the bitter with the sweet until something useful emerged",event:"you brought two impossible things together and held them steady long enough to see what they could become",calling:"moderation is not weakness but precision and you apply it like a surgeon's blade"},
{name:"The Devil",file:"tarot/cards/major/devil.png",skills:["Deception","Intimidation"],tool:"Thieves' Tools",equip:["thieves' tools","false idol (pocket-sized)","25 gp"],feat:"shadow",adj:"Unbound",noun:"Deceiver",origin:"You were bound to something long enough to understand what bondage really is",event:"you stared into the face of your own worst impulse and chose whether to follow it or turn away",calling:"the chains are of your own making now and you decide each morning whether to put them on"},
{name:"The Tower",file:"tarot/cards/major/tower.png",skills:["Athletics","Survival"],tool:"Mason's Tools",equip:["cracked stone with symbol","50 ft of rope","flint and steel"],feat:"survivor",adj:"Broken",noun:"Wraith",origin:"Everything you built, or belonged to, came down in fire and ruin and screaming",event:"the tower fell and in the rubble you found something you never expected: yourself, still standing",calling:"you build nothing that cannot also be walked away from because you have learned what collapse costs"},
{name:"The Star",file:"tarot/cards/major/star.png",skills:["Nature","Performance"],tool:"Musical Instrument",equip:["lute","star chart (hand-drawn)","10 gp"],feat:"performer",adj:"Luminous",noun:"Dreamer",origin:"You have always been drawn to beauty, found it in strange places, named it, and tried to share it",event:"hope arrived when you had given up looking, gentle and impossible and completely real",calling:"you carry a quiet light you cannot explain, only offer to those who have forgotten darkness ends"},
{name:"The Moon",file:"tarot/cards/major/moon.png",skills:["Stealth","Deception"],tool:"Disguise Kit",equip:["dark traveling cloak","forged documents","moonstone"],feat:"shadow",adj:"Shadowed",noun:"Ghost",origin:"You moved through a world of half-truths and shifting faces, never certain which one was yours",event:"the fog lifted for a moment and showed you something you could not unsee however much you tried",calling:"you are drawn to illusions not to be deceived but to find what is hidden inside them"},
{name:"The Sun",file:"tarot/cards/major/sun.png",skills:["Performance","Persuasion"],tool:"Musical Instrument",equip:["signet ring","fine clothes","25 gp"],feat:"performer",adj:"Radiant",noun:"Champion",origin:"You were beloved, or briefly famous, or simply bathed in a season of golden unrepeatable luck",event:"you stood in the full light of public triumph and felt both the warmth and the danger of being seen",calling:"joy is not naive — it is defiant — and you have chosen to wield it like a weapon"},
{name:"Judgement",file:"tarot/cards/major/judgement.png",skills:["History","Religion"],tool:"Calligrapher's Supplies",equip:["confession journal","holy symbol","last letter (unsent)"],feat:"devout",adj:"Redeemed",noun:"Witness",origin:"You were called to account — by gods, by courts, or your own conscience — and found yourself honestly wanting",event:"the reckoning came and you chose to face it rather than flee which changed something fundamental in you",calling:"you seek to be worthy of your second chance and to help others find theirs"},
{name:"The World",file:"tarot/cards/major/world.png",skills:["History","Athletics"],tool:"Navigator's Tools",equip:["detailed world map","50 ft of rope","foreign coins"],feat:"wanderer",adj:"Worldly",noun:"Traveler",origin:"You have been to the ends of more things than most people imagine exist and still found more to explore",event:"a journey completed left you richer in scars and stories than any treasure and you would not trade either",calling:"the world is unfinished and you are not done with it yet"},

{name:"Ace of Cups",file:"tarot/cards/cups/ace_of _cups.png",skills:["Insight","Persuasion"],tool:"Herbalism Kit",equip:["glass vial (gift)","fresh healing herbs","personal journal"],feat:"lover",adj:"Open",noun:"Vessel",origin:"Your heart was always almost embarrassingly open and people came to you with things they could not carry alone",event:"a sudden surge of feeling overwhelmed all your careful plans and remade them",calling:"you believe the greatest gift you can offer is your full attention and an honest heart"},
{name:"Two of Cups",file:"tarot/cards/cups/two_of _cups.png",skills:["Persuasion","Insight"],tool:"Brewer's Supplies",equip:["paired tokens (one kept)","fine wine","love letter"],feat:"lover",adj:"Bound",noun:"Partner",origin:"You understood early that the deepest strength is the kind you lend to another and receive in return",event:"you formed a bond that altered the course of both your lives",calling:"you carry that connection like a compass, always knowing which direction is toward the ones you love"},

{name:"Four of Cups",file:"tarot/cards/cups/four_of _cups.png",skills:["Insight","Investigation"],tool:"Alchemist's Supplies",equip:["meditation mat","dreamcatcher","half-used candle"],feat:"scholar",adj:"Contemplative",noun:"Dreamer",origin:"You were known for staring past what was in front of you, always searching for something you could not name",event:"opportunity knocked while you were looking inward and you almost missed it — but not quite",calling:"you are still learning to be present in the moment your life is actually happening"},

// ── Layout ────────────────────────────────────────────────────────────
const LABELS = ['I · Origin', 'II · Trial', 'III · Calling'];

function computeDims() {
    const W = window.innerWidth, H = window.innerHeight;
    // V: page padding(22) + top(50) + label(22+7) + aspect(62+7) + footer(22+4) + gaps(8)
    const resV = 22 + 50 + 29 + 69 + 26 + 8;
    // H: page h-padding(32) + 2 card gaps(32) + content gap(16) + story panel(220) + panel h-padding(30)
    const resH = 32 + 32 + 16 + 220 + 30;
    const cardH = Math.min(Math.max(130, H - resV), (W - resH) / 3 * (220 / 130), 520);
    const cardW = Math.round(cardH * 130 / 220);
    document.documentElement.style.setProperty('--card-h', cardH + 'px');
    document.documentElement.style.setProperty('--card-w', cardW + 'px');
}

// ── State ─────────────────────────────────────────────────────────────
let pickCount = 0, pickedCards = [], colData = [];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function spawnP(x,y){const c=document.getElementById('particles');for(let i=0;i<12;i++){const p=document.createElement('div');p.className='particle';p.style.left=(x+(Math.random()-.5)*55)+'px';p.style.top=(y+(Math.random()-.5)*32)+'px';p.style.animationDuration=(Math.random()*1.2+.8)+'s';p.style.animationDelay=(Math.random()*.2)+'s';c.appendChild(p);p.addEventListener('animationend',()=>p.remove());}}

    pickCount = 0; pickedCards = []; colData = [];
    const sp = document.getElementById('story-panel');
    sp.classList.remove('show', 'all-major');
    document.getElementById('draw-btn').classList.remove('show');
    const bl = document.getElementById('bonus-line');
    bl.textContent = ''; bl.classList.remove('show');

    const row = document.getElementById('card-row');
    row.innerHTML = '';
    computeDims();

    const deck = shuffle(CARDS).slice(0, 3);

    deck.forEach((card, i) => {
        const col = document.createElement('div');
        col.className = 'card-col';

        const lbl = document.createElement('div');
        lbl.className = 'col-label';
        lbl.id = `lbl-${i}`;

        const scene = document.createElement('div');
        scene.className = 'card-scene';
        scene.id = `scene-${i}`;

        const cardEl = document.createElement('div');
        cardEl.className = 'card';

        const back = document.createElement('div');
        back.className = 'card-face card-back';
        back.innerHTML = '<div class="card-back-inner"><span class="back-sym">✦</span></div>';

        const front = document.createElement('div');
        front.className = 'card-face card-front';
        const img = document.createElement('img');
        img.src = card.file; img.alt = card.name;
        front.appendChild(img);

        cardEl.appendChild(back); cardEl.appendChild(front);
        scene.appendChild(cardEl);

        const txt = document.createElement('div');
        txt.className = 'aspect-text';
        txt.id = `txt-${i}`;

        col.appendChild(lbl); col.appendChild(scene); col.appendChild(txt);
        row.appendChild(col);

        colData.push({ card, lbl, scene, cardEl, txt, picked: false, slotIndex: i });

        scene.addEventListener('click', () => pickSlot(i));
    });
}

// ── Pick ──────────────────────────────────────────────────────────────
function pickSlot(i) {
    const d = colData[i];
    if (d.picked) return;
    d.picked = true;
    d.scene.classList.add('picked');

    const order = pickCount; // 0, 1, or 2
    pickCount++;
    pickedCards[order] = d.card;

    // Show label
    d.lbl.textContent = LABELS[order];
    d.lbl.classList.add('show');

    // Flip card
    setTimeout(() => {
        d.cardEl.classList.add('flipped');
        const r = d.scene.getBoundingClientRect();
        spawnP(r.left + r.width / 2, r.top + r.height / 2);

        // Show aspect text after flip lands
        setTimeout(() => {
            d.txt.innerHTML = buildAspect(d.card, order);
            d.txt.classList.add('show');

            if (pickCount === 3) setTimeout(showResult, 500);
        }, 600);
    }, 40);
}

function buildAspect(card, order) {
    if (order === 0) {
        return `<div class="aspect-card-name">${card.name}</div>
                <div class="aspect-label">Skill Proficiencies</div>
                <div class="aspect-val">${card.skills.join(' · ')}</div>`;
    } else if (order === 1) {
        return `<div class="aspect-card-name">${card.name}</div>
                <div class="aspect-label">Tool · Equipment</div>
                <div class="aspect-val">${card.tool} · ${card.equip.join(', ')}</div>`;
    } else {
        const feat = FEATURES[card.feat];
        return `<div class="aspect-card-name">${card.name}</div>
                <div class="aspect-label">Feature</div>
                <div class="aspect-val">${feat.name}</div>`;
    }
}

// ── Bonus conditions ─────────────────────────────────────────────────
const RANK_MAP = {Ace:1,Two:2,Three:3,Four:4,Five:5,Six:6,Seven:7,Eight:8,Nine:9,Ten:10,Page:11,Knight:12,Queen:13,King:14};
const PRIMES = new Set([2,3,5,7,11,13]);
const SUIT_NOTES = {
    cups:      'The Cup runs through every chapter — feeling, connection, and the depths of the heart shape all that you are.',
    wands:     'The Wand burns through every chapter — passion, will, and the refusal to be still drive all that you do.',
    swords:    'The Sword cuts through every chapter — truth, conflict, and hard-won clarity mark every turn of your path.',
    pentacles: 'The Pentacle grounds every chapter — patience, craft, and things built to last are the measure of your life.',
};

function getSuit(card) {
    if (card.file.includes('/cups/')) return 'cups';
    if (card.file.includes('/wands/')) return 'wands';
    if (card.file.includes('/swords/')) return 'swords';
    if (card.file.includes('/pentacles/')) return 'pentacles';
    return null;
}
function getRank(card) { return RANK_MAP[card.name.split(' ')[0]] ?? null; }

const TRIPLE_NOTES = {
    1:  'Three Aces — raw potential at every crossroads. What you carry into the world has uncommon force at its root.',
    2:  'Three Twos — every chapter holds a choice, a balance, a pairing. Duality is not confusion but the language your fate speaks.',
    3:  'Three Threes — creation and community echo through every stage. You build, and others come to join what you have made.',
    4:  'Three Fours — structure and stillness repeat throughout. You understand that foundations are not limits but roots.',
    5:  'Three Fives — conflict arrives at every turn, not as punishment but as the friction that shapes what you are becoming.',
    6:  'Three Sixes — harmony sought and found across every chapter. You are someone the world slowly arranges itself around.',
    7:  'Three Sevens — reflection and vision mark every stage. You see further than most, which is both the gift and the cost.',
    8:  'Three Eights — motion and momentum drive your story without pause. You are always in the act of becoming.',
    9:  'Three Nines — you have stood at the edge of completion more than once. Resilience is not something you practice; it is something you are.',
    10: 'Three Tens — full cycles, endings that carry new beginnings inside them. You complete what others leave half-finished.',
    11: 'Three Pages — the universe is sending a message at every chapter that cannot be missed. Your story is one long arrival into yourself, and you are still becoming what you will be. Something watches your progress with unusual interest.',
    12: 'Three Knights — you have never been content to wait. Pursuit, momentum, and the willingness to ride hard into the unknown define you at every stage. The world rearranges itself around your motion, and that is exactly how you prefer it.',
    13: 'Three Queens — authority shaped by wisdom rather than force runs through every chapter. Yours is a power that has never needed to raise its voice to be felt in every corner of every room you have ever entered.',
    14: 'Three Kings — full mastery appears at every stage of your path. You build not just for yourself but for something that outlasts you, and whatever you have made, you have made it to endure long after you are gone.',
};

function buildBonusLines(cards) {
    const lines = [];
    const suits = cards.map(getSuit);
    if (!suits.includes(null) && suits[0] === suits[1] && suits[1] === suits[2])
        lines.push(SUIT_NOTES[suits[0]]);

    const ranks = cards.map(getRank);
    if (ranks.every(r => r !== null)) {
        if (ranks[0] === ranks[1] && ranks[1] === ranks[2])
            lines.push(TRIPLE_NOTES[ranks[0]]);

        const s = [...ranks].sort((a, b) => a - b);
        if (s[1] === s[0] + 1 && s[2] === s[1] + 1)
            lines.push('These three fall in unbroken sequence — your origin, trial, and calling form a single continuous thread.');
        if (ranks.every(r => PRIMES.has(r)))
            lines.push('Three primes, indivisible. Your path answers to no common factor.');
    }
    return lines;
}

// ── Result ────────────────────────────────────────────────────────────
function showResult() {
    const [c1, c2, c3] = pickedCards;
    const panel = document.getElementById('story-panel');
    const allMajor = pickedCards.every(c => c.file.includes('major/'));

    if (allMajor) {
        panel.classList.add('all-major');
        document.getElementById('bg-name').innerHTML =
            `<div class="arcana-eyebrow">✦ &nbsp;The Grand Arcana&nbsp; ✦</div>${c1.name} · ${c2.name} · ${c3.name}`;
        document.getElementById('bg-story').textContent =
            `Three forces of cosmic weight have spoken. ${c1.origin}. ${c2.event} — no mortal coincidence, but a convergence written long before your birth. ${c3.calling}. The Arcana itself has taken notice of you.`;
    } else {
        document.getElementById('bg-name').textContent = `${c1.adj} ${c3.noun}`;
        document.getElementById('bg-story').textContent =
            `${c1.origin}. ${c2.event}, a moment you have never quite been able to leave behind. ${c3.calling}.`;
    }

    const bonusEl = document.getElementById('bonus-line');
    const lines = buildBonusLines(pickedCards);
    if (lines.length) {
        bonusEl.innerHTML = lines.join('<br><br>');
        bonusEl.classList.add('show');
    } else {
        bonusEl.textContent = '';
        bonusEl.classList.remove('show');
    }

    panel.classList.add('show');
    document.getElementById('draw-btn').classList.add('show');
}

// ── Init ──────────────────────────────────────────────────────────────
window.addEventListener('resize', () => { computeDims(); });
deal();
</script>
