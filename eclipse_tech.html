    desc: "Default energy source. Provides +3 energy. Energy Production must equal or exceed Energy Consumption from all Ship Parts on that Blueprint.",
    stats: { "Energy": "+3" }
  },
  {
    name: "Fusion Source",
    cat: "part",
    type: "Energy Source",
    tags: ["energy"],
    desc: "Provides +6 energy. Requires FUSION SOURCE Tech.",
    stats: { "Energy": "+6" }
  },
  {
    name: "Tachyon Source",
    cat: "part",
    type: "Energy Source",
    tags: ["energy"],
    desc: "Provides +9 energy. Requires TACHYON SOURCE Tech.",
    stats: { "Energy": "+9" }
  },
  {
    name: "Zero-Point Source",
    cat: "part",
    type: "Energy Source",
    tags: ["energy"],
    desc: "Provides +12 energy — the most powerful energy source. Requires ZERO-POINT SOURCE Rare Tech.",
    stats: { "Energy": "+12" }
  }
];

// ── Tag colour helper ──────────────────────────────────────────────────────
const tagClass = {
  weapon: "tag-weapon", shield: "tag-shield", computer: "tag-computer",
  drive: "tag-drive", hull: "tag-hull", energy: "tag-energy",
  build: "tag-build", instant: "tag-instant", permanent: "tag-permanent",
  missile: "tag-missile"
};

// ── Render ─────────────────────────────────────────────────────────────────
function renderCards(items) {
  const container = document.getElementById("cards-container");
  container.innerHTML = "";

  if (items.length === 0) {
    document.getElementById("no-results").style.display = "block";
    return;
  }
  document.getElementById("no-results").style.display = "none";

  const groups = { military: [], grid: [], nano: [], rare: [], part: [] };
  items.forEach(item => groups[item.cat]?.push(item));

  const catMeta = {
    military: { label: "⚔ Military Technologies" },
    grid:     { label: "⊞ Grid Technologies" },
    nano:     { label: "◎ Nano Technologies" },
    rare:     { label: "◯ Rare Technologies" },
    part:     { label: "★ Ship Parts & Upgrades" }
  };

  for (const [cat, items] of Object.entries(groups)) {
    if (!items.length) continue;
    const section = document.createElement("div");
    section.innerHTML = `<div class="section-header">${catMeta[cat].label}</div>`;
    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.cat = item.cat;

      const tagHTML = item.tags.map(t =>
        `<span class="tag ${tagClass[t] || ''}">${t}</span>`
      ).join("");

      const statsHTML = Object.entries(item.stats).map(([k, v]) =>
        `<span class="stat"><strong>${k}:</strong> ${v}</span>`
      ).join("");

      card.innerHTML = `
        <div class="card-name">${item.name}</div>
        <div class="card-type">${item.type}</div>
        <div>${tagHTML}</div>
        <div class="card-desc">${item.desc}</div>
        ${statsHTML ? `<div class="stat-row">${statsHTML}</div>` : ""}
      `;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  }
}

// ── State ──────────────────────────────────────────────────────────────────
let activeFilter = "all";
let query = "";

function filtered() {
  return data.filter(item => {
    const matchCat = activeFilter === "all" || item.cat === activeFilter;
    if (!matchCat) return false;
    if (!query) return true;
    const q = query.toLowerCase();
    return (
      item.name.toLowerCase().includes(q) ||
      item.desc.toLowerCase().includes(q) ||
      item.type.toLowerCase().includes(q) ||
      item.tags.some(t => t.includes(q))
    );
  });
}

document.getElementById("search").addEventListener("input", e => {
  query = e.target.value;
  renderCards(filtered());
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.cat;
    renderCards(filtered());
  });
});

renderCards(data);
</script>
</body>
</html>
