<!DOCTYPE html>
<html>
<head>
    <title>Fish School Animation with Lilypads</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: rgb(40, 44, 52);
            overflow: hidden;
        }
        canvas {
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Vector {
            constructor(x = 0, y = 0) {
                this.x = x;
                this.y = y;
            }

            copy() {
                return new Vector(this.x, this.y);
            }

            add(v) {
                if (v instanceof Vector) {
                    this.x += v.x;
                    this.y += v.y;
                }
                return this;
            }

            static add(v1, v2) {
                return new Vector(v1.x + v2.x, v1.y + v2.y);
            }

            sub(v) {
                if (v instanceof Vector) {
                    this.x -= v.x;
                    this.y -= v.y;
                }
                return this;
            }

            static sub(v1, v2) {
                return new Vector(v1.x - v2.x, v1.y - v2.y);
            }

            setMag(mag) {
                const curr = Math.sqrt(this.x * this.x + this.y * this.y);
                if (curr !== 0) {
                    this.x = (this.x / curr) * mag;
                    this.y = (this.y / curr) * mag;
                }
                return this;
            }

            heading() {
                return Math.atan2(this.y, this.x);
            }

            static fromAngle(angle) {
                return new Vector(Math.cos(angle), Math.sin(angle));
            }

            dist(v) {
                const dx = this.x - v.x;
                const dy = this.y - v.y;
                return Math.sqrt(dx * dx + dy * dy);
            }

            mult(n) {
                this.x *= n;
                this.y *= n;
                return this;
            }

            normalize() {
                const len = Math.sqrt(this.x * this.x + this.y * this.y);
                if (len !== 0) {
                    this.x /= len;
                    this.y /= len;
                }
                return this;
            }
        }
        function normalizeAngle(angle) {
    return angle - Math.PI * 2 * Math.floor((angle + Math.PI) / (Math.PI * 2));
}

function smoothAngle(current, target, smoothing) {
    // Find the shortest angular distance
    let diff = normalizeAngle(target - current);
    
    // Apply smoothing to the difference
    return normalizeAngle(current + diff * smoothing);
}
        class Chain {
            constructor(origin, jointCount, linkSize, angleConstraint = Math.PI * 2) {
                this.linkSize = linkSize;
                this.angleConstraint = angleConstraint;
                this.joints = [];
                this.angles = [];
                this.targetAngles = []; // Add target angles for smoothing
                this.smoothingFactor = 0.3; // Adjust this to control turn smoothness
        
                this.joints.push(origin.copy());
                this.angles.push(0);
                this.targetAngles.push(0);
        
                for (let i = 1; i < jointCount; i++) {
                    this.joints.push(Vector.add(this.joints[i - 1], new Vector(0, this.linkSize)));
                    this.angles.push(0);
                    this.targetAngles.push(0);
                }
            }
        
            resolve(pos) {
                // Only update head target angle when there is meaningful movement;
                // a near-zero vector produces a garbage heading() which causes snapping.
                const headMovement = Vector.sub(pos, this.joints[0]);
                if (headMovement.x * headMovement.x + headMovement.y * headMovement.y > 0.25) {
                    this.targetAngles[0] = headMovement.heading();
                }
                this.angles[0] = smoothAngle(this.angles[0], this.targetAngles[0], this.smoothingFactor);
                this.joints[0] = pos;

                for (let i = 1; i < this.joints.length; i++) {
                    const curAngle = Vector.sub(this.joints[i - 1], this.joints[i]).heading();

                    // normalizeAngle handles negative values correctly — JS % keeps the
                    // sign of the dividend so the old ((x+π)%(2π))-π formula snapped
                    // whenever curAngle - prev crossed the -π boundary.
                    const diff = normalizeAngle(curAngle - this.angles[i - 1]);
                    this.targetAngles[i] = this.angles[i - 1] +
                        Math.max(-this.angleConstraint, Math.min(this.angleConstraint, diff));

                    this.angles[i] = smoothAngle(this.angles[i], this.targetAngles[i], this.smoothingFactor);

                    this.joints[i] = Vector.sub(
                        this.joints[i - 1],
                        Vector.fromAngle(this.angles[i]).setMag(this.linkSize)
                    );
                }
            }
        }

        class Lilypad {
            constructor(x, y, size) {
                this.position = new Vector(x, y);
                this.size = size;
                this.angle = Math.random() * Math.PI * 2;
                this.wobbleOffset = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.5 + Math.random() * 0.5;
            }

            update(time) {
                // Add gentle wobble motion
                this.angle = Math.sin(time * this.wobbleSpeed + this.wobbleOffset) * 0.05;
            }

            display(ctx) {
                ctx.save();
                ctx.translate(this.position.x, this.position.y);
                ctx.rotate(this.angle);

                // Draw lilypad
                ctx.fillStyle = '#2d5a27';
                ctx.strokeStyle = '#1a3517';
                ctx.lineWidth = 2;
                
                // Main pad
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                // Create a split/cut in the lilypad
                ctx.lineTo(this.size * 0.3, 0);
                ctx.arc(0, 0, this.size * 0.3, 0, Math.PI * 0.3);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Veins
                ctx.strokeStyle = '#3a7034';
                ctx.lineWidth = 1;
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(
                        Math.cos(angle) * this.size * 0.9,
                        Math.sin(angle) * this.size * 0.9
                    );
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        function noise(x, y) {
            return (Math.sin(x * 0.5 + y * 0.7) + Math.sin(x * 0.8 + y * 0.3)) * 0.5;
        }
        class FoodPellet {
            constructor(x, y) {
                this.position = new Vector(x, y);
                
                // Create radial spread velocity
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 3;
                this.velocity = new Vector(
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed
                );
                
                this.size = 2 + Math.random() * 1.5;
                this.lifespan = 800 + Math.random() * 400;
                this.eaten = false;
                this.rotation = Math.random() * Math.PI * 2;
                this.corners = 3 + Math.floor(Math.random() * 3);
                this.points = this.generatePoints();
                
                // Settling properties
                this.settling = true;
                this.settleTime = 10 + Math.random() * 5; // Shorter settle time
                this.friction = 0.65;
            }
        
            generatePoints() {
                const points = [];
                for (let i = 0; i < this.corners; i++) {
                    const angle = (i / this.corners) * Math.PI * 2;
                    const radius = this.size * (0.8 + Math.random() * 0.4);
                    points.push({
                        x: Math.cos(angle) * radius,
                        y: Math.sin(angle) * radius
                    });
                }
                return points;
            }
        
            display(ctx) {
                ctx.save();
                ctx.translate(this.position.x, this.position.y);
                ctx.rotate(this.rotation);
        
                ctx.fillStyle = '#e9a067';
                ctx.strokeStyle = '#c17f45';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
        
                ctx.restore();
            }
        
            update() {
                if (this.settling && this.settleTime > 0) {
                    this.position.add(this.velocity);
                    
                    // Apply friction to slow down movement
                    this.velocity.x *= this.friction;
                    this.velocity.y *= this.friction;
                    
                    // Update rotation based on movement
                    this.rotation += this.velocity.x * 0.1;
                    
                    this.settleTime--;
                    
                    // Stop all movement when settle time runs out
                    if (this.settleTime <= 0) {
                        this.velocity.x = 0;
                        this.velocity.y = 0;
                        this.settling = false;
                    }
                }
        
                this.lifespan--;
                return this.lifespan > 0 && !this.eaten;
            }
        }
        
        
        class Fish {
            constructor(origin) {
                this.scale = 0.55 + Math.random() * 0.9;
                const linkSize = Math.max(9, Math.round(16 * this.scale));
                this.spine = new Chain(origin, 12, linkSize, Math.PI / 12);

                this.bodyWidth = [16, 20, 23, 23, 22, 18, 14, 10, 7, 4].map(w => w * this.scale);

                this.position = origin.copy();
                this.velocity = Vector.fromAngle(Math.random() * Math.PI * 2).mult(2);
                this.acceleration = new Vector();

                this.targetVelocity = this.velocity.copy();
                this.smoothingFactor = 0.08 + Math.random() * 0.1;
                this.momentum = 0.92;

                this.foodDetectionRadius = 230 + Math.random() * 120;
                this.foodAttractionStrength = 8 + Math.random() * 6;
                this.eatingDistance = 12 + 12 * this.scale;

                this.maxSpeed = 1.8 + Math.random() * 2.2;
                this.maxForce = 0.18 + Math.random() * 0.15;
                this.perceptionRadius = 80 + Math.random() * 60;
                this.separationRadius = 38 + 20 * this.scale;
                this.collisionRadius = 30 + 14 * this.scale;
                this.collisionForce = 0.5;

                this.time = Math.random() * 1000;
                this.timeStep = 0.001;
                this.margin = 100;

                this.previousPositions = Array(5).fill().map(() => origin.copy());

                this.generateKoiAppearance();
            }

            generateKoiAppearance() {
                const koiTypes = [
                    'kohaku', 'kohaku',
                    'sanke', 'sanke',
                    'showa',
                    'ogon_gold', 'ogon_silver', 'ogon_orange',
                    'asagi',
                    'bekko_white', 'bekko_yellow',
                    'utsuri_white', 'utsuri_yellow',
                ];
                this.koiType = koiTypes[Math.floor(Math.random() * koiTypes.length)];
                this.metallic = false;
                switch (this.koiType) {
                    case 'kohaku':
                        this.baseColor = '#f0ebe0';
                        this.patches = this.genPatches('#c03020', 2 + Math.floor(Math.random() * 3));
                        this.finColor = 'rgba(240,235,220,0.75)';
                        break;
                    case 'sanke':
                        this.baseColor = '#f0ebe0';
                        this.patches = [
                            ...this.genPatches('#c03020', 1 + Math.floor(Math.random() * 3)),
                            ...this.genPatches('#222222', 1 + Math.floor(Math.random() * 2)),
                        ];
                        this.finColor = 'rgba(240,235,220,0.75)';
                        break;
                    case 'showa':
                        this.baseColor = '#222222';
                        this.patches = [
                            ...this.genPatches('#c03020', 1 + Math.floor(Math.random() * 3)),
                            ...this.genPatches('#f0ebe0', 1 + Math.floor(Math.random() * 2)),
                        ];
                        this.finColor = 'rgba(50,50,50,0.8)';
                        break;
                    case 'ogon_gold':
                        this.baseColor = '#d4a020';
                        this.patches = [];
                        this.finColor = 'rgba(212,160,32,0.8)';
                        this.metallic = true;
                        break;
                    case 'ogon_silver':
                        this.baseColor = '#c0c8d0';
                        this.patches = [];
                        this.finColor = 'rgba(192,200,208,0.8)';
                        this.metallic = true;
                        break;
                    case 'ogon_orange':
                        this.baseColor = '#e06818';
                        this.patches = [];
                        this.finColor = 'rgba(224,104,24,0.8)';
                        this.metallic = true;
                        break;
                    case 'asagi':
                        this.baseColor = '#5878a0';
                        this.patches = this.genPatches('#c03020', 1 + Math.floor(Math.random() * 2));
                        this.finColor = 'rgba(180,70,50,0.65)';
                        break;
                    case 'bekko_white':
                        this.baseColor = '#f0ebe0';
                        this.patches = this.genPatches('#222222', 2 + Math.floor(Math.random() * 3));
                        this.finColor = 'rgba(240,235,220,0.75)';
                        break;
                    case 'bekko_yellow':
                        this.baseColor = '#e8c820';
                        this.patches = this.genPatches('#222222', 2 + Math.floor(Math.random() * 3));
                        this.finColor = 'rgba(232,200,32,0.8)';
                        break;
                    case 'utsuri_white':
                        this.baseColor = '#222222';
                        this.patches = this.genPatches('#f0ebe0', 2 + Math.floor(Math.random() * 3));
                        this.finColor = 'rgba(50,50,50,0.8)';
                        break;
                    case 'utsuri_yellow':
                        this.baseColor = '#222222';
                        this.patches = this.genPatches('#e8c820', 2 + Math.floor(Math.random() * 3));
                        this.finColor = 'rgba(50,50,50,0.8)';
                        break;
                }
            }

            genPatches(color, count) {
                const patches = [];
                for (let i = 0; i < count; i++) {
                    patches.push({
                        color,
                        spineIndex: 0.5 + Math.random() * 7.5,
                        sizeX: 0.45 + Math.random() * 0.75,
                        sizeY: 0.7 + Math.random() * 1.0,
                        lateralOffset: (Math.random() - 0.5) * 0.6,
                    });
                }
                return patches;
            }

            smooth(value, target, factor) {
                return value + (target - value) * factor;
            }

            getSmoothedPosition() {
                let smoothed = new Vector();
                this.previousPositions.forEach(pos => smoothed.add(pos));
                smoothed.mult(1 / this.previousPositions.length);
                return smoothed;
            }
            seekFood(foodPellets) {
                let steering = new Vector();
                let nearestDist = Infinity;
                let nearestFood = null;
        
                // Find the nearest food pellet
                for (let food of foodPellets) {
                    let d = this.position.dist(food.position);
                    if (d < this.foodDetectionRadius && d < nearestDist) {
                        nearestDist = d;
                        nearestFood = food;
                    }
                }
        
                // If food is found, seek it
                if (nearestFood) {
                    let desired = Vector.sub(nearestFood.position, this.position);
                    let dist = desired.x * desired.x + desired.y * desired.y;
                    
                    // If close enough, eat the food
                    if (dist < this.eatingDistance * this.eatingDistance) {
                        nearestFood.eaten = true;
                        return new Vector();
                    }
        
                    desired.normalize();
                    desired.mult(this.maxSpeed);
                    steering = Vector.sub(desired, this.velocity);
                    steering.setMag(this.maxForce * this.foodAttractionStrength);
                }
        
                return steering;
            }
            align(boids) {
                let steering = new Vector();
                let total = 0;
                
                for (let other of boids) {
                    let d = this.position.dist(other.position);
                    if (other !== this && d < this.perceptionRadius && d > this.collisionRadius) {
                        steering.add(other.velocity);
                        total++;
                    }
                }
                
                if (total > 0) {
                    steering.mult(1/total);
                    steering.setMag(this.maxSpeed);
                    steering.sub(this.velocity);
                    steering.setMag(this.maxForce);
                }
                
                return steering;
            }

            cohesion(boids) {
                let steering = new Vector();
                let total = 0;
                
                for (let other of boids) {
                    let d = this.position.dist(other.position);
                    if (other !== this && d < this.perceptionRadius && d > this.collisionRadius) {
                        steering.add(other.position);
                        total++;
                    }
                }
                
                if (total > 0) {
                    steering.mult(1/total);
                    steering.sub(this.position);
                    steering.setMag(this.maxSpeed);
                    steering.sub(this.velocity);
                    steering.setMag(this.maxForce);
                }
                
                return steering;
            }

            separation(boids) {
                let steering = new Vector();
                let total = 0;
                
                for (let other of boids) {
                    if (other === this) continue;
                    
                    let d = this.position.dist(other.position);
                    if (d < this.separationRadius) {
                        let diff = Vector.sub(this.position, other.position);
                        
                        let scale = 1 / Math.max(d, 0.1);
                        scale = Math.pow(scale, 2);
                        
                        if (d < this.collisionRadius) {
                            scale *= 1.5;
                        }
                        
                        diff.mult(scale);
                        steering.add(diff);
                        total++;
                    }
                }
                
                if (total > 0) {
                    steering.mult(1/total);
                    steering.setMag(this.maxSpeed);
                    steering.sub(this.velocity);
                    steering.setMag(this.maxForce);
                }
                
                return steering;
            }

            avoidWalls() {
                let steer = new Vector();
                const falloff = 3;
                
                if (this.position.x < this.margin) {
                    steer.x = this.maxForce * Math.exp(-this.position.x / (this.margin / falloff));
                } else if (this.position.x > canvas.width - this.margin) {
                    steer.x = -this.maxForce * Math.exp(-(canvas.width - this.position.x) / (this.margin / falloff));
                }
                
                if (this.position.y < this.margin) {
                    steer.y = this.maxForce * Math.exp(-this.position.y / (this.margin / falloff));
                } else if (this.position.y > canvas.height - this.margin) {
                    steer.y = -this.maxForce * Math.exp(-(canvas.height - this.position.y) / (this.margin / falloff));
                }
                
                return steer;
            }

            flock(boids, foodPellets) {
                let alignment = this.align(boids);
                let cohesion = this.cohesion(boids);
                let separation = this.separation(boids);
                let avoidWalls = this.avoidWalls();
                let food = this.seekFood(foodPellets);
                
                this.time += this.timeStep;
                let wanderAngle = noise(this.time, 0) * Math.PI * 2;
                let wanderForce = Vector.fromAngle(wanderAngle);
                wanderForce.mult(0.02);
                
                // Adjust weights when food is present
                if (food.x !== 0 || food.y !== 0) {
                    alignment.mult(0.2);   // Reduce alignment when seeking food
                    cohesion.mult(0.1);    // Reduce cohesion when seeking food
                    separation.mult(1.0);   // Keep separation important
                    food.mult(2.0);        // Strong food seeking behavior
                } else {
                    alignment.mult(0.5);
                    cohesion.mult(0.3);
                    separation.mult(1.5);
                }
                
                avoidWalls.mult(2.0);
                
                let totalForce = new Vector();
                totalForce.add(alignment);
                totalForce.add(cohesion);
                totalForce.add(separation);
                totalForce.add(avoidWalls);
                totalForce.add(wanderForce);
                totalForce.add(food);
                
                if (totalForce.x !== 0 || totalForce.y !== 0) {
                    totalForce.setMag(this.maxForce);
                }
                
                this.acceleration.add(totalForce);
            }
            update() {
                this.acceleration.mult(this.momentum);
                this.targetVelocity.add(this.acceleration);
                this.targetVelocity.setMag(this.maxSpeed);
                
                this.velocity.x = this.smooth(this.velocity.x, this.targetVelocity.x, this.smoothingFactor);
                this.velocity.y = this.smooth(this.velocity.y, this.targetVelocity.y, this.smoothingFactor);
                
                this.position.add(this.velocity);
                
                this.previousPositions.push(this.position.copy());
                this.previousPositions.shift();
                
                const smoothedPos = this.getSmoothedPosition();
                const velocityAngle = this.velocity.heading();
                const nextPos = Vector.fromAngle(velocityAngle).mult(16).add(smoothedPos);
                
                this.spine.resolve(smoothedPos);
                
                this.acceleration.mult(0);
            }

            display(ctx) {
                const j = this.spine.joints;
                const a = this.spine.angles;

                const headToMid1 = relativeAngleDiff(a[0], a[6]);
                const headToMid2 = relativeAngleDiff(a[0], a[7]);
                const headToTail = headToMid1 + relativeAngleDiff(a[6], a[11]);

                const buildBodyPath = () => {
                    ctx.beginPath();
                    for (let i = 0; i < 10; i++) {
                        const x = this.getPos(i, Math.PI / 2, 0, 'x');
                        const y = this.getPos(i, Math.PI / 2, 0, 'y');
                        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    }
                    ctx.lineTo(this.getPos(9, Math.PI, 0, 'x'), this.getPos(9, Math.PI, 0, 'y'));
                    for (let i = 9; i >= 0; i--) {
                        ctx.lineTo(this.getPos(i, -Math.PI / 2, 0, 'x'), this.getPos(i, -Math.PI / 2, 0, 'y'));
                    }
                    ctx.lineTo(this.getPos(0, -Math.PI / 6, 0, 'x'), this.getPos(0, -Math.PI / 6, 0, 'y'));
                    ctx.lineTo(this.getPos(0, 0, 2, 'x'), this.getPos(0, 0, 2, 'y'));
                    ctx.lineTo(this.getPos(0, Math.PI / 6, 0, 'x'), this.getPos(0, Math.PI / 6, 0, 'y'));
                    ctx.closePath();
                };

                // Pectoral fins
                ctx.fillStyle = this.finColor;
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1;
                this.drawFin(ctx, 3, Math.PI / 3, 0, a[2] - Math.PI / 4, 44 * this.scale, 18 * this.scale);
                this.drawFin(ctx, 3, -Math.PI / 3, 0, a[2] + Math.PI / 4, 44 * this.scale, 18 * this.scale);

                // Ventral fins
                this.drawFin(ctx, 7, Math.PI / 2, 0, a[6] - Math.PI / 4, 28 * this.scale, 10 * this.scale);
                this.drawFin(ctx, 7, -Math.PI / 2, 0, a[6] + Math.PI / 4, 28 * this.scale, 10 * this.scale);

                // Caudal fin — always visible, fans when turning
                ctx.fillStyle = this.finColor;
                ctx.beginPath();
                for (let i = 8; i < 12; i++) {
                    const t = (i - 8) / 3;
                    const tw = Math.max(0, (4 * t + headToTail * 12 * t) * this.scale);
                    const x = j[i].x + Math.cos(a[i] - Math.PI / 2) * tw;
                    const y = j[i].y + Math.sin(a[i] - Math.PI / 2) * tw;
                    if (i === 8) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                for (let i = 11; i >= 8; i--) {
                    const t = (i - 8) / 3;
                    const tw = Math.max(0, (4 * t - headToTail * 12 * t) * this.scale);
                    const x = j[i].x + Math.cos(a[i] + Math.PI / 2) * tw;
                    const y = j[i].y + Math.sin(a[i] + Math.PI / 2) * tw;
                    ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Base body fill
                buildBodyPath();
                ctx.fillStyle = this.baseColor;
                ctx.fill();

                // Color patches clipped to body shape
                if (this.patches.length > 0) {
                    ctx.save();
                    buildBodyPath();
                    ctx.clip();
                    for (const patch of this.patches) {
                        const si = Math.min(Math.floor(patch.spineIndex), j.length - 2);
                        const sf = patch.spineIndex - si;
                        const px = j[si].x + (j[si + 1].x - j[si].x) * sf;
                        const py = j[si].y + (j[si + 1].y - j[si].y) * sf;
                        const bw = this.bodyWidth[Math.min(si, this.bodyWidth.length - 1)];
                        ctx.save();
                        ctx.translate(px, py);
                        ctx.rotate(a[si] + Math.PI / 2);
                        ctx.fillStyle = patch.color;
                        ctx.beginPath();
                        ctx.ellipse(patch.lateralOffset * bw, 0, bw * patch.sizeX, bw * patch.sizeY, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                    ctx.restore();
                }

                // Metallic sheen for ogon types
                if (this.metallic) {
                    ctx.save();
                    buildBodyPath();
                    ctx.clip();
                    const gx = j[2].x, gy = j[2].y;
                    const grad = ctx.createRadialGradient(gx, gy, 2, gx, gy, 55 * this.scale);
                    grad.addColorStop(0, 'rgba(255,255,255,0.42)');
                    grad.addColorStop(0.5, 'rgba(255,255,255,0.1)');
                    grad.addColorStop(1, 'rgba(0,0,0,0.08)');
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.restore();
                }

                // Body outline
                buildBodyPath();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Dorsal fin
                ctx.fillStyle = this.finColor;
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(j[4].x, j[4].y);
                ctx.bezierCurveTo(j[5].x, j[5].y, j[6].x, j[6].y, j[7].x, j[7].y);
                ctx.bezierCurveTo(
                    j[6].x + Math.cos(a[6] + Math.PI / 2) * headToMid2 * 8 * this.scale,
                    j[6].y + Math.sin(a[6] + Math.PI / 2) * headToMid2 * 8 * this.scale,
                    j[5].x + Math.cos(a[5] + Math.PI / 2) * headToMid1 * 8 * this.scale,
                    j[5].y + Math.sin(a[5] + Math.PI / 2) * headToMid1 * 8 * this.scale,
                    j[4].x, j[4].y
                );
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Eyes — dark koi-style
                const eyeR = Math.max(1.5, 2.8 * this.scale);
                ctx.fillStyle = '#1a1008';
                ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                ctx.lineWidth = 0.5;
                for (const side of [-1, 1]) {
                    ctx.beginPath();
                    ctx.arc(
                        this.getPos(0, side * Math.PI / 2, -4.5, 'x'),
                        this.getPos(0, side * Math.PI / 2, -4.5, 'y'),
                        eyeR, 0, Math.PI * 2
                    );
                    ctx.fill();
                    ctx.stroke();
                }

                // Barbels (koi whiskers)
                this.drawBarbels(ctx, j, a);
            }

            drawBarbels(ctx, j, a) {
                const headAngle = a[0];
                const snoutX = this.getPos(0, 0, 2, 'x');
                const snoutY = this.getPos(0, 0, 2, 'y');
                ctx.strokeStyle = 'rgba(110,85,65,0.7)';
                ctx.lineWidth = Math.max(0.5, 0.9 * this.scale);
                ctx.lineCap = 'round';
                const barbelPairs = [
                    { sideAngle: 0.4, length: 7 * this.scale, sideOffset: 5 * this.scale },
                    { sideAngle: 0.65, length: 5 * this.scale, sideOffset: 3 * this.scale },
                ];
                for (const bp of barbelPairs) {
                    for (const side of [-1, 1]) {
                        const sx = snoutX + Math.cos(headAngle + side * Math.PI / 2) * bp.sideOffset * 0.5;
                        const sy = snoutY + Math.sin(headAngle + side * Math.PI / 2) * bp.sideOffset * 0.5;
                        const ex = sx + Math.cos(headAngle + side * bp.sideAngle) * bp.length
                                      - Math.cos(headAngle) * bp.length * 0.15;
                        const ey = sy + Math.sin(headAngle + side * bp.sideAngle) * bp.length
                                      - Math.sin(headAngle) * bp.length * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(sx, sy);
                        ctx.quadraticCurveTo((sx + ex) / 2, (sy + ey) / 2, ex, ey);
                        ctx.stroke();
                    }
                }
            }

            drawFin(ctx, i, angleOffset, lengthOffset, rotation, width, height) {
                ctx.save();
                ctx.translate(
                    this.getPos(i, angleOffset, lengthOffset, 'x'),
                    this.getPos(i, angleOffset, lengthOffset, 'y')
                );
                ctx.rotate(rotation);
                ctx.beginPath();
                ctx.ellipse(0, 0, width/2, height/2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }

            getPos(i, angleOffset, lengthOffset, coord) {
                const angle = this.spine.angles[i] + angleOffset;
                const width = this.bodyWidth[i] + lengthOffset;
                return coord === 'x'
                    ? this.spine.joints[i].x + Math.cos(angle) * width
                    : this.spine.joints[i].y + Math.sin(angle) * width;
            }
        }

        function constrainAngle(angle, prevAngle, constraint) {
            const diff = ((angle - prevAngle + Math.PI) % (Math.PI * 2)) - Math.PI;
            return prevAngle + Math.max(-constraint, Math.min(constraint, diff));
        }

        function relativeAngleDiff(a1, a2) {
            return normalizeAngle(a2 - a1);
        }

        // Initialize scene
        // Initialize lilypads with spacing
const fishes = [];
const lilypads = [];
const foodPellets = [];
const numFish = 15;
const numLilypads = 8;
const margin = 100;
const minSpacing = 100; // Minimum distance between lilypad centers
const maxAttempts = 50; // Maximum attempts to place each lilypad
canvas.addEventListener('click', (event) => {
    const rect = canvas.getBoundingClientRect();
    const baseX = event.clientX - rect.left;
    const baseY = event.clientY - rect.top;
    
    // Create a random number of pellets (5-12)
    const numPellets = 5 + Math.floor(Math.random() * 7);
    
    for (let i = 0; i < numPellets; i++) {
        // Tighter initial spread
        const spreadX = baseX + (Math.random() - 0.5) * 20;
        const spreadY = baseY + (Math.random() - 0.5) * 20;
        foodPellets.push(new FoodPellet(spreadX, spreadY));
    }
});


for (let i = 0; i < numLilypads; i++) {
    let placed = false;
    let attempts = 0;
    
    while (!placed && attempts < maxAttempts) {
        const size = 30 + Math.random() * 20;
        const randomX = margin + Math.random() * (canvas.width - 2 * margin);
        const randomY = margin + Math.random() * (canvas.height - 2 * margin);
        
        // Check if position is valid
        let isValid = true;
        for (const pad of lilypads) {
            const dx = randomX - pad.position.x;
            const dy = randomY - pad.position.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < (size + pad.size + minSpacing)) {
                isValid = false;
                break;
            }
        }
        
        if (isValid) {
            lilypads.push(new Lilypad(randomX, randomY, size));
            placed = true;
        }
        
        attempts++;
    }
    
    // If we couldn't place after max attempts, try with a smaller spacing
    if (!placed) {
        const size = 30 + Math.random() * 20;
        const fallbackSpacing = minSpacing / 2;
        
        for (let attempt = 0; attempt < maxAttempts; attempt++) {
            const randomX = margin + Math.random() * (canvas.width - 2 * margin);
            const randomY = margin + Math.random() * (canvas.height - 2 * margin);
            
            let tooClose = false;
            for (const pad of lilypads) {
                const dx = randomX - pad.position.x;
                const dy = randomY - pad.position.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < (size + pad.size + fallbackSpacing)) {
                    tooClose = true;
                    break;
                }
            }
            
            if (!tooClose) {
                lilypads.push(new Lilypad(randomX, randomY, size));
                break;
            }
        }
    }
}

// Initialize fish after lilypads
for (let i = 0; i < numFish; i++) {
    const randomX = margin + Math.random() * (canvas.width - 2 * margin);
    const randomY = margin + Math.random() * (canvas.height - 2 * margin);
    fishes.push(new Fish(new Vector(randomX, randomY)));
}
        // Animation loop
        function animate() {
            const time = Date.now() * 0.001;
            ctx.fillStyle = 'rgb(40, 44, 52)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        
            // Update and remove eaten/expired food
            for (let i = foodPellets.length - 1; i >= 0; i--) {
                if (!foodPellets[i].update()) {
                    foodPellets.splice(i, 1);
                }
            }
        
            // Display food
            for (let food of foodPellets) {
                food.display(ctx);
            }
        
            // Update and display fish with food awareness
            for (let fish of fishes) {
                fish.flock(fishes, foodPellets);
                fish.update();
                fish.display(ctx);
            }
        
            // Display lilypads last
            for (let lilypad of lilypads) {
                lilypad.update(time);
                lilypad.display(ctx);
            }
        
            requestAnimationFrame(animate);
        }
        // Start animation
        animate();
    </script>
